<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoga Dashboard — Stats</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#FAF7F4;--bg2:#FFFFFF;--bg3:#F3EEE9;--border:#E8DDD4;
  --ink:#5C4E42;--muted:#A8998C;--gold:#C4875A;
  --p1:#C4875A;--p2:#D4856A;--p3:#7FA882;
}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;font-size:14px;}
header{padding:28px 36px 24px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;}
.eyebrow{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
header h1{font-family:'Cormorant Garamond',serif;font-size:clamp(22px,3.5vw,34px);font-weight:300;color:#3C3028;line-height:1.1;}
header h1 em{font-style:italic;color:var(--gold);}
.pill{background:var(--bg3);border:1px solid var(--border);border-radius:40px;padding:8px 18px;text-align:center;}
.pill .pv{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--gold);line-height:1;}
.pill .pl{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.sync-status{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#C8DEC9;flex-shrink:0;}
.sync-dot.loading{background:#F0D9A0;}
.sync-dot.error{background:#EFC4B8;}
main{padding:24px 36px 48px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;}
.card.wide{grid-column:span 3;}
.card.half{grid-column:span 2;}
.clabel{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.ctitle{font-family:'Cormorant Garamond',serif;font-size:16px;color:#3C3028;font-weight:400;margin-bottom:14px;}
.kpi-row{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.kpi{flex:1;min-width:100px;background:var(--bg3);border-radius:8px;padding:12px 14px;}
.kpi .kv{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:#3C3028;line-height:1;}
.kpi .kl{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-top:4px;}
.kpi .ks{font-size:11px;color:var(--muted);margin-top:2px;}
.rings-row{display:flex;justify-content:space-around;align-items:center;gap:10px;flex-wrap:wrap;}
.ring-item{display:flex;flex-direction:column;align-items:center;gap:7px;}
.ring-wrap{position:relative;width:110px;height:110px;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.ring-pct{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;line-height:1;}
.ring-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.ring-name{font-size:12px;font-weight:500;text-align:center;}
.ring-hours{font-size:11px;color:var(--muted);}
.bar-list{display:flex;flex-direction:column;gap:10px;}
.bar-row{display:flex;flex-direction:column;gap:4px;}
.bar-meta{display:flex;justify-content:space-between;}
.bar-label{font-size:12px;color:var(--ink);}
.bar-val{font-size:11px;color:var(--muted);}
.bar-track{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width 0.6s ease;}
@media(max-width:640px){
  header,main{padding-left:16px;padding-right:16px;}
  main{grid-template-columns:1fr;}
  .card.wide,.card.half{grid-column:span 1;}
}
</style>
</head>

const PC={"🌱 Phase 1":"#C4875A","🔥 Phase 2":"#D4856A","🌿 Phase 3":"#7FA882"};
const TC={Pratique:"#C4875A",Pranayama:"#B8A0D4",Philosophie:"#8B9ED4",Yin:"#85BECC",Samedi:"#7FA882",Repos:"#C4A882"};

const API=SUPABASE_URL+"/rest/v1/sessions";
const HEADERS={"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json"};

let state={};

function setSync(status,label){
  const dot=document.getElementById("syncDot");
  const lbl=document.getElementById("syncLabel");
  dot.className="sync-dot"+(status==="ok"?" ":status==="loading"?" loading":" error");
  lbl.textContent=label;
}

async function loadFromSupabase(){
  setSync("loading","Synchronisation…");
  try{
    const r=await fetch(API+"?select=id,done",{headers:HEADERS});
    if(!r.ok)throw new Error(r.status);
    const rows=await r.json();
    state={};
    rows.forEach(row=>{ if(row.done) state[row.id]=true; });
    setSync("ok","Synchronisé ✓");
    render();
  }catch(e){
    setSync("error","Erreur de connexion");
  }
}

function render(){
  const done=SESSIONS.filter(s=>state[s.id]);
  const totalMin=done.reduce((a,s)=>a+s.d,0);
  const totalH=(totalMin/60).toFixed(1);
  document.getElementById("totalH").textContent=totalH+"h";

  const pct=Math.round(done.length/SESSIONS.length*100);
  const rem=Math.max(0,180-totalMin/60).toFixed(1);
  document.getElementById("kpiRow").innerHTML=[
    {v:totalH+"h",l:"Heures réalisées",s:"objectif 180h"},
    {v:done.length,l:"Sessions faites",s:"sur "+SESSIONS.length},
    {v:pct+"%",l:"Avancement global",s:(SESSIONS.length-done.length)+" restantes"},
    {v:rem+"h",l:"Restant",s:"pour 180h"},
  ].map(k=>`<div class="kpi"><div class="kv">${k.v}</div><div class="kl">${k.l}</div><div class="ks">${k.s}</div></div>`).join("");

  const phases=["🌱 Phase 1","🔥 Phase 2","🌿 Phase 3"];
  const pnames=["Fondations","Approfondissement","Intégration"];
  const pmonths=["Mois 1–2","Mois 3–4","Mois 5–6"];
  document.getElementById("ringsRow").innerHTML=phases.map((p,i)=>{
    const tot=SESSIONS.filter(s=>s.p===p);
    const dn=tot.filter(s=>state[s.id]);
    const pp=tot.length?Math.round(dn.length/tot.length*100):0;
    const col=PC[p];
    const R=44,cx=55,cy=55,circ=2*Math.PI*R,dash=circ*pp/100;
    const pH=(dn.reduce((a,s)=>a+s.d,0)/60).toFixed(1);
    return`<div class="ring-item">
      <div class="ring-wrap">
        <svg width="110" height="110" viewBox="0 0 110 110">
          <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#EDE4DC" stroke-width="8"/>
          <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${col}" stroke-width="8"
            stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}" stroke-linecap="round"/>
        </svg>
        <div class="ring-center">
          <div class="ring-pct" style="color:${col}">${pp}%</div>
          <div class="ring-sub">${dn.length}/${tot.length}</div>
        </div>
      </div>
      <div class="ring-name" style="color:${col}">${pnames[i]}</div>
      <div class="ring-hours">${pmonths[i]} · ${pH}h</div>
    </div>`;
  }).join("");

  const types=["Pratique","Pranayama","Philosophie","Yin","Samedi","Repos"];
  const maxT=Math.max(...types.map(t=>SESSIONS.filter(s=>s.t===t&&state[s.id]).reduce((a,s)=>a+s.d,0)),1);
  document.getElementById("typeBars").innerHTML=types.map(t=>{
    const dm=SESSIONS.filter(s=>s.t===t&&state[s.id]).reduce((a,s)=>a+s.d,0);
    const tm=SESSIONS.filter(s=>s.t===t).reduce((a,s)=>a+s.d,0);
    const w=Math.round(dm/maxT*100);
    return`<div class="bar-row">
      <div class="bar-meta"><span class="bar-label">${t}</span><span class="bar-val">${(dm/60).toFixed(1)}h / ${(tm/60).toFixed(0)}h</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${TC[t]||'#C4A882'}"></div></div>
    </div>`;
  }).join("");

  const maxP=Math.max(...phases.map(p=>SESSIONS.filter(s=>s.p===p&&state[s.id]).reduce((a,s)=>a+s.d,0)),1);
  document.getElementById("phaseBars").innerHTML=phases.map(p=>{
    const dm=SESSIONS.filter(s=>s.p===p&&state[s.id]).reduce((a,s)=>a+s.d,0);
    const tm=SESSIONS.filter(s=>s.p===p).reduce((a,s)=>a+s.d,0);
    const w=Math.round(dm/maxP*100);
    return`<div class="bar-row">
      <div class="bar-meta"><span class="bar-label">${p}</span><span class="bar-val">${(dm/60).toFixed(1)}h / ${(tm/60).toFixed(0)}h</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${PC[p]}"></div></div>
    </div>`;
  }).join("");
}

loadFromSupabase();
setInterval(loadFromSupabase, 15000);
</script>
