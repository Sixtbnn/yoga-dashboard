<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#FAF7F4;--bg2:#FFFFFF;--bg3:#F3EEE9;--border:#E8DDD4;
  --ink:#5C4E42;--muted:#A8998C;--gold:#C4875A;
}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;font-size:14px;}
header{padding:20px 36px 16px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.eyebrow{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:4px;}
header h1{font-family:'Cormorant Garamond',serif;font-size:clamp(18px,3vw,26px);font-weight:300;color:#3C3028;}
header h1 em{font-style:italic;color:var(--gold);}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.count-pill{background:var(--bg3);border:1px solid var(--border);border-radius:40px;padding:5px 14px;font-size:12px;color:var(--ink);}
.count-pill span{font-weight:500;color:var(--gold);}
.sync-status{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#C8DEC9;flex-shrink:0;transition:background 0.3s;}
.sync-dot.loading{background:#F0D9A0;}
.sync-dot.error{background:#EFC4B8;}
.reset-btn{font-size:11px;padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;}
.reset-btn:hover{border-color:#D4856A;color:#D4856A;}
.toolbar{padding:12px 36px 10px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;gap:7px;flex-wrap:wrap;}
.fbtn{font-size:11px;padding:3px 11px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--muted);cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;}
.fbtn.active{border-color:var(--gold);background:#FDF0E8;color:var(--gold);}
.sep{width:1px;height:18px;background:var(--border);margin:0 3px;align-self:center;}
.session-wrap{padding:14px 36px 48px;}
.slist{display:flex;flex-direction:column;gap:4px;}
.srow{display:grid;grid-template-columns:30px 1fr auto 22px;gap:10px;align-items:center;padding:9px 12px;border-radius:7px;cursor:pointer;border:1px solid var(--border);background:var(--bg3);transition:all 0.15s;}
.srow:hover{border-color:var(--gold);background:#FDF8F4;}
.srow.done{background:#EFF5F0;border-color:#C8DEC9;}
.srow.saving{opacity:0.6;pointer-events:none;}
.sid{font-size:10px;color:var(--muted);}
.sname{font-size:12px;color:var(--ink);line-height:1.4;}
.srow.done .sname{text-decoration:line-through;opacity:0.55;color:#7FA882;}
.smeta{font-size:10px;color:var(--muted);margin-top:2px;}
.stag{font-size:10px;padding:2px 8px;border-radius:10px;white-space:nowrap;background:var(--bg2);border:1px solid var(--border);}
.scheck{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--bg2);font-size:12px;}
.srow.done .scheck{border-color:#7FA882;background:#D6ECD7;color:#7FA882;}
.empty{padding:32px;text-align:center;color:var(--muted);font-size:13px;font-style:italic;}
@media(max-width:600px){
  header,.toolbar,.session-wrap{padding-left:14px;padding-right:14px;}
  .srow{grid-template-columns:26px 1fr 20px;}
  .stag{display:none;}
}
</style>
</head>

let state={};
let filter="all";

function setSync(s,l){
  document.getElementById("syncDot").className="sync-dot"+(s==="ok"?"":s==="loading"?" loading":" error");
  document.getElementById("syncLabel").textContent=l;
}

async function loadFromSupabase(){
  setSync("loading","Chargement…");
  try{
    const r=await fetch(API+"?select=id,done&limit=200",{headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY}});
    if(!r.ok)throw new Error(r.status);
    const rows=await r.json();
    state={};
    rows.forEach(row=>{if(row.done)state[row.id]=true;});
    setSync("ok","Synchronisé ✓");
    render();
  }catch(e){
    setSync("error","Erreur connexion");
    render();
  }
}

async function toggle(id){
  const el=document.getElementById("srow-"+id);
  if(el)el.classList.add("saving");
  const newVal=!state[id];
  state[id]=newVal;
  render();
  try{
    const r=await fetch(API,{
      method:"POST",
      headers:{...{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json","Prefer":"resolution=merge-duplicates"}},
      body:JSON.stringify({id:id,done:newVal,updated_at:new Date().toISOString()})
    });
    if(!r.ok)throw new Error(r.status);
    setSync("ok","Sauvegardé ✓");
  }catch(e){
    setSync("error","Erreur sauvegarde");
    state[id]=!newVal;
    render();
  }
}

async function resetAll(){
  if(!confirm("Réinitialiser toutes les sessions ?"))return;
  setSync("loading","Réinitialisation…");
  try{
    await fetch(API+"?id=gte.1",{method:"DELETE",headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY}});
    state={};
    setSync("ok","Réinitialisé ✓");
    render();
  }catch(e){setSync("error","Erreur");}
}

function setFilter(f){
  filter=f;
  document.querySelectorAll(".fbtn").forEach(b=>b.classList.remove("active"));
  const el=document.getElementById("f-"+f);
  if(el)el.classList.add("active");
  render();
}

function render(){
  const done=SESSIONS.filter(s=>state[s.id]);
  document.getElementById("doneCount").textContent=done.length;
  let filtered=SESSIONS;
  if(filter==="p1"||filter==="p2"||filter==="p3")filtered=SESSIONS.filter(s=>s.pk===filter);
  else if(filter==="todo")filtered=SESSIONS.filter(s=>!state[s.id]);
  else if(filter!=="all")filtered=SESSIONS.filter(s=>s.t===filter);
  if(!filtered.length){
    document.getElementById("slist").innerHTML=`<div class="empty">Aucune session dans ce filtre.</div>`;
    return;
  }
  document.getElementById("slist").innerHTML=filtered.map(s=>{
    const dn=!!state[s.id];
    const col=TC[s.t]||"#C4A882";
    return`<div class="srow${dn?" done":""}" id="srow-${s.id}" onclick="toggle(${s.id})">
      <div class="sid">#${s.id}</div>
      <div>
        <div class="sname">${s.s}</div>
        <div class="smeta">${s.p} · ${s.d} min</div>
      </div>
      <div class="stag" style="color:${col};border-color:${col}33">${s.t}</div>
      <div class="scheck">${dn?"✓":""}</div>
    </div>`;
  }).join("");
}
